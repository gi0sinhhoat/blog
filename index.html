<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Blog</title>
    <style>
        body {
            font-family: 'Be Vietnam Pro', system-ui, sans-serif;
        }
        body {
            background-image: url("images/aero3.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }
        body h2, body p {
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .glass {
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.25);
            border-top-color: rgba(255,255,255,0.5);
            border-left-color: rgba(255,255,255,0.4);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.18),
                inset 0 1px 0 rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(16px) saturate(1.6);
            -webkit-backdrop-filter: blur(16px) saturate(1.6);
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 40px auto;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 200%;
            font-family: 'Playfair Display', serif;
        }

        .logo {
            text-decoration: none;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        #list { display: block; width: 500px; margin: 0 auto; font-size: 150%; }

        .box {
            display: block;
            width: 500px;
            padding: 20px;
            margin: 40px auto;
            font-weight: bold;
            line-height: 1.6;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .box:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.45);
            box-shadow:
                0 12px 40px rgba(0,0,0,0.22),
                inset 0 1px 0 rgba(255,255,255,0.5);
            transform: translateY(-3px) scale(1.01);
        }

        /* Button */
        .button {
            position: relative;
            border: 1px solid #0360df;
            border-radius: 50px;
            padding: 8px 20px;
            background-color: #0360df;
            background-image: radial-gradient(75% 50% at 50% 0%, #f4feff, transparent),
                              radial-gradient(75% 35% at 50% 80%, #8de3fc, transparent);
            box-shadow: inset 0 -2px 4px 1px rgba(17,110,231,0.6),
                        inset 0 -4px 4px 1px #8de3fc,
                        inset 0 0 2px 1px rgba(255,255,255,0.2),
                        0 1px 4px 1px rgba(17,110,231,0.2),
                        0 1px 4px 1px rgba(0,0,0,0.1);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 1px 1px #116ee7;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, background-color 0.2s;
        }
        .button::after {
            content: "";
            position: absolute;
            top: 1px; left: 50%;
            transform: translateX(-50%);
            border-radius: 50px;
            width: 80%;
            height: 40%;
            background-image: linear-gradient(to bottom, #f4feff, transparent);
            opacity: 0.75;
            pointer-events: none;
        }
        .button:hover { transform: scale(1.04); }
        .button:active { border-color: #0048d5; transform: scale(0.96); background-color: #0048d5; }

        /* Modal */
        .modal {
            background-color: rgba(0,0,0,0.35);
            opacity: 0;
            position: fixed;
            inset: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal.open { opacity: 1; z-index: 999; }

        .modal-inner {
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border: 1px solid rgba(255,255,255,0.25);
            border-top-color: rgba(255,255,255,0.55);
            border-left-color: rgba(255,255,255,0.4);
            box-shadow:
                0 24px 64px rgba(0,0,0,0.28),
                inset 0 1px 0 rgba(255,255,255,0.4);
            border-radius: 20px;
            padding: 32px;
            width: 420px;
            transform: translateY(-20px);
            transition: transform 0.3s ease-in-out;
        }
        .modal.open .modal-inner { transform: translateY(0); }
        .modal-inner h2 { color: rgba(255,255,255,0.95); margin-bottom: 20px; font-size: 20px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea {
            display: block;
            width: 100%;
            padding: 10px 14px;
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.3);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: rgba(255,255,255,0.45); }
        .form-group input:focus,
        .form-group textarea:focus { border-color: rgba(255,255,255,0.7); }

        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn-submit, .btn-close {
            flex: 1;
            padding: 11px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .btn-submit { background: #4f46e5; color: #fff; transition: background 0.2s; }
        .btn-submit:hover { background: #3730a3; }
        .btn-close {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.3);
            transition: background 0.2s;
        }
        .btn-close:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>

<body>
    <header class="glass">
        <a class="logo">🌿 BLOG Của khanwnat</a>
        <button class="button" id="openModal">Đăng bài</button>
    </header>

    <div id="list"></div>

    <div class="modal" id="modal">
        <div class="modal-inner">
            <h2>Tạo bài đăng</h2>
            <div class="form-group">
                <label for="titleInput">Tiêu đề</label>
                <input type="text" id="titleInput" placeholder="Nhập tiêu đề...">
            </div>
            <div class="form-group">
                <label for="contentInput">Nội dung</label>
                <textarea id="contentInput" rows="16" placeholder="Nhập nội dung..."></textarea>
            </div>
            <div class="form-group">
                <label for="keyInput">Key</label>
                <input type="password" id="keyInput" placeholder="Nhập key...">
            </div>
            <div class="modal-actions">
                <button class="btn-submit" id="submitModal">ĐĂNG</button>
                <button class="btn-close" id="closeModal">ĐÓNG</button>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("modal");
        const submitBtn = document.getElementById("submitModal");

        document.getElementById("openModal").addEventListener("click", () => modal.classList.add("open"));
        document.getElementById("closeModal").addEventListener("click", () => modal.classList.remove("open"));

        fetch('posts/posts.json')
            .then(r => r.json())
            .then(files => {
                const list = document.getElementById('list');
                list.innerHTML = files.map(file =>
                    `<div><a href="post.html?file=${encodeURIComponent(file)}.md" class="box glass">${file}</a></div>`
                ).join('');
            });

        submitBtn.addEventListener("click", async () => {
            const title = document.getElementById("titleInput").value;
            const content = document.getElementById("contentInput").value;
            const key = document.getElementById("keyInput").value;

            if (!title || !content || !key) {
                alert("Vui lòng nhập đủ tiêu đề, nội dung và key!");
                return;
            }

            submitBtn.textContent = "Đang đăng...";
            submitBtn.disabled = true;

            try {
                const res = await fetch("https://sparkling-bonus-7dcb.dogiabao21112006.workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title, content, key })
                });
                const data = await res.json();

                if (data.ok) {
                    alert("done");
                    ["titleInput", "contentInput", "keyInput"].forEach(id => document.getElementById(id).value = "");
                    modal.classList.remove("open");
                    location.reload();
                } else {
                    alert("Lỗi: " + data.error);
                }
            } catch {
                alert("Không kết nối được server");
            } finally {
                submitBtn.textContent = "ĐĂNG";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
