<!DOCTYPE html>
<html>
<head>
   

    <style>
        .logo { text-decoration: none; }
        
        .box {
            width: 500px;
            padding: 20px;
          
            background: rgb(255, 255, 255);
            margin: 40px auto;
            line-height: 1.6;
            border-radius: 20px;
            border-top: 1px solid rgb(255,255,255,0.4);
            border-left : 1px solid rgb(255,255,255,0.3);
            box-shadow: 3px 3px 3px rgb(0,0,0,0.089);
            background: rgba(255, 255, 255, 0.027); 
            backdrop-filter: blur(8px);          
            -webkit-backdrop-filter: blur(8px);   
        }
    </style>
    <style>
        header{
            display: flex;
            align-items: center;
            justify-content: space-between;
             color: rgb(0, 0, 0);
          
            
            margin: 40px auto;
            line-height: 1.6;
            border-radius: 20px;
            border-top: 1px solid rgb(255,255,255,0.4);
            border-left : 1px solid rgb(255,255,255,0.3);
            box-shadow: 3px 3px 3px rgb(0,0,0,0.089);
            background: rgba(255, 255, 255, 0.027); 
            backdrop-filter: blur(8px);          
            -webkit-backdrop-filter: blur(8px);   


              padding: 10px 20px;
            font-size:200%;
           font-family: 'Playfair Display', serif;
             line-height: 1.6;
            border-radius: 20px;    
            
        }
        body {
            
            h2 {
                color: #1a1a2e;
            }
            p {
                color: #1a1a2e ;
                }
             background-image: url("https://static.freepsdfiles.net/uploads/2017/03/beautiful-nature-background_psd.jpg");
   
    background-position: center;
    background-repeat:  no-repeat;
    background-attachment: fixed;
    background-size: cover;
   
   
        }
    </style>
</head>

<body>
   <header>
  <a href="#" class="logo">🌿 Blog của em an</a>
  <a href="#" class="btn-create">Post</a>
</header>
<div id="list"></div>

<script>
  fetch('posts/posts.json')
    .then(r => r.json())
    .then(files => {
      const list = document.getElementById('list');
      files.forEach(file => {
        list.innerHTML += `<div> <a href="post.html?file=${file}"  class="box" >${file}</a></div>`;
      });
    });
</script>
    

   

    <div class="box"> 
        <h3 > 123</h3>
    </div>
        
     
</body>
</html>
