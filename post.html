<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Bài viết</title>
    <style>
        body {
            font-family: 'Be Vietnam Pro', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            background-image: url("images/aero2.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }
        body h1, body h2, body h3, body p, body li {
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .glass {
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.25);
            border-top-color: rgba(255,255,255,0.5);
            border-left-color: rgba(255,255,255,0.4);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.18),
                inset 0 1px 0 rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(16px) saturate(1.6);
            -webkit-backdrop-filter: blur(16px) saturate(1.6);
        }

        header {
            display: flex;
            align-items: center;
            margin: 40px auto;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 200%;
            font-family: 'Be Vietnam Pro', system-ui, sans-serif;
        }

        .box {
            display: block;
            width: 600px;
            padding: 32px 40px;
            margin: 0 auto 60px;
            font-weight: 400;
            line-height: 1.8;
            color: rgba(255,255,255,0.92);
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            text-decoration: none;
        }

        .box h1, .box h2, .box h3 {
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            margin-top: 1.5em;
        }

        .box code {
            background: rgba(0,0,0,0.25);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.9em;
        }

        .box pre {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 16px;
            overflow-x: auto;
        }

        .box pre code {
            background: none;
            padding: 0;
        }

        /* Back button */
        .btn-back {
            position: relative;
            border: 1px solid #0360df;
            border-radius: 50px;
            padding: 8px 20px;
            background-color: #0360df;
            background-image: radial-gradient(75% 50% at 50% 0%, #f4feff, transparent),
                              radial-gradient(75% 35% at 50% 80%, #8de3fc, transparent);
            box-shadow: inset 0 -2px 4px 1px rgba(17,110,231,0.6),
                        inset 0 -4px 4px 1px #8de3fc,
                        inset 0 0 2px 1px rgba(255,255,255,0.2),
                        0 1px 4px 1px rgba(17,110,231,0.2),
                        0 1px 4px 1px rgba(0,0,0,0.1);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Be Vietnam Pro', system-ui, sans-serif;
            text-shadow: 0 1px 1px #116ee7;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s, background-color 0.2s;
        }
        .btn-back::after {
            content: "";
            position: absolute;
            top: 1px; left: 50%;
            transform: translateX(-50%);
            border-radius: 50px;
            width: 80%;
            height: 40%;
            background-image: linear-gradient(to bottom, #f4feff, transparent);
            opacity: 0.75;
            pointer-events: none;
        }
        .btn-back:hover { transform: scale(1.04); }
        .btn-back:active { border-color: #0048d5; transform: scale(0.96); background-color: #0048d5; }
    </style>
</head>
<body>
    <header class="glass">
        <button class="btn-back" onclick="window.location.href='index.html'">← Quay về</button>
    </header>

    <div id="content" class="box glass">Đang tải...</div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const file = params.get('file');
        fetch(`posts/${file}`)
            .then(r => r.text())
            .then(md => {
                document.getElementById('content').innerHTML = marked.parse(md);
            });
    </script>
</body>
</html>
