<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="images/favicon.png" type="image/png">
  <title>Bài viết</title>
  <style>
    .btn-modal {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
        }

        .btn-modal:hover {
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        .btn-modal:active {
            transform: translateY(0px);
            background: rgba(255, 255, 255, 0.12);
        }
  </style>
  <style> 
  .box {
            font-weight: bold;
             color:rgba(255, 255, 255, 0.9);text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            text-decoration: none;
            width: 500px; /* thay vì 500px cố định */
            display: block;
            padding: 20px;
            background: rgb(255, 255, 255);
            margin: 40px auto;
            line-height: 1.6;
            border-radius: 20px;
            border-top: 1px solid rgb(255,255,255,0.4);
            border-left: 1px solid rgb(255,255,255,0.3);
            box-shadow: 3px 3px 3px rgb(0,0,0,0.089);
            background: rgba(255, 255, 255, 0.027);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        header {
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgb(252, 252, 252);
            margin: 40px auto;
            line-height: 1.6;
            border-radius: 20px;
            border-top: 1px solid rgb(255,255,255,0.4);
            border-left: 1px solid rgb(255,255,255,0.3);
            box-shadow: 3px 3px 3px rgb(0,0,0,0.089);
            background: rgba(255, 255, 255, 0.027);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 20px;
            font-size: 200%;
            font-family: 'Playfair Display', serif;
            line-height: 1.6;
            border-radius: 20px;
        }
    body {
        min-height: 100vh;  /* thêm dòng này */
    margin: 0;
        background-image: url("	images/aero2.jpg");
        background-position: center;
    background-repeat:  no-repeat;
    background-attachment: fixed;
    background-size: cover;
   
    }
  </style>
</head>
<body>
<header>
  <button class="btn-modal" onclick="window.location.href='index.html'">← Quay về</button>
</header>
  <div id="content" class = "box">Đang tải...</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const params = new URLSearchParams(location.search);
const file = params.get('file');
fetch(`posts/${file}`)   
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  });
</script>



</body>
</html>
