<!DOCTYPE html>
<html>
<head>
  <title>Bài viết</title>
  <style> 
  .box {
            font-weight: bold;
            color: #1a1a2e;
            text-decoration: none;
            width: 500px; /* thay vì 500px cố định */
            display: block;
            padding: 20px;
            background: rgb(255, 255, 255);
            margin: 40px auto;
            line-height: 1.6;
            border-radius: 20px;
            border-top: 1px solid rgb(255,255,255,0.4);
            border-left: 1px solid rgb(255,255,255,0.3);
            box-shadow: 3px 3px 3px rgb(0,0,0,0.089);
            background: rgba(255, 255, 255, 0.027);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        header {
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgb(0, 0, 0);
            margin: 40px auto;
            line-height: 1.6;
            border-radius: 20px;
            border-top: 1px solid rgb(255,255,255,0.4);
            border-left: 1px solid rgb(255,255,255,0.3);
            box-shadow: 3px 3px 3px rgb(0,0,0,0.089);
            background: rgba(255, 255, 255, 0.027);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 20px;
            font-size: 200%;
            font-family: 'Playfair Display', serif;
            line-height: 1.6;
            border-radius: 20px;
        }
    body {
        min-height: 100vh;  /* thêm dòng này */
    margin: 0;
        background-image: url("	https://frutigeraeroarchive.org/images/introduction/asadal.jpg");
        background-position: center;
    background-repeat:  no-repeat;
    background-attachment: fixed;
    background-size: cover;
   
    }

  </style>
</head>
<body>
<header >
  <a href="index.html">← Quay về</a>
</header>
  <div id="content" class = "box">Đang tải...</div>

</body>
</html>
